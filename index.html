      padding: 60px 20px;
      color: #333;
    }
    .loader {
      border: 4px solid #e9ecef;
      border-top: 4px solid #0d6efd;
      border-radius: 50%;

      animation: spin 0.8s linear infinite;

    @keyframes spin {

    }
    .btn-open {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 24px;
      background: #0d6efd;
      color: white;
