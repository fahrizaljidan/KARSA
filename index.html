<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KARSA Absensi Online</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: #f4f6f9;
      margin: 0;
      padding: 40px 20px;
      color: #333;
    }
    .loader {
      border: 4px solid #e9ecef;
      border-top: 4px solid #0d6efd;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    a {
      color: #0d6efd;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="loader"></div>
  <h3>Membuka Aplikasi KARSA...</h3>
  <p style="font-size: 13px; color: #666;">Mohon tunggu sebentar, sedang menghubungkan ke server.</p>
  <p style="font-size: 12px; margin-top: 20px;">
    Jika tidak berpindah otomatis, <a id="manualLink" href="#">Klik di sini untuk buka aplikasi</a>
  </p>

  <script>
    // Paste URL Web App Google Apps Script Anda di sini (akhiran /exec)
    var GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbztNTbARko_1GH_IU_o0g1ia9gxXPaa3dHwEVW6iqrdXXEd3wzDhDJocgj4gIqne6PfKQ/exec";

    document.getElementById("manualLink").href = GOOGLE_SCRIPT_URL;

    // Memberikan jeda 300ms agar browser HP siap memuat sesi tanpa blank
    window.addEventListener('load', function() {
      setTimeout(function() {
        window.location.href = GOOGLE_SCRIPT_URL;
      }, 300);
    });
  </script>

</body>
</html>
