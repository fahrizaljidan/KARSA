  <!-- Inject PWA Web Manifest secara In-Line -->
  <script>
    (function() {
      var logoUrl = "https://lh3.googleusercontent.com/d/11cXExGWBx-9_ZW3rTbOMjrXmKzXyQODt";
      var manifestData = {
        "name": "KARSA Absensi Online",
        "short_name": "KARSA",
        "start_url": "./",
        "display": "standalone",
        "background_color": "#ffffff",
        "theme_color": "#0d6efd",
        "icons": [
          { "src": logoUrl, "sizes": "192x192", "type": "image/png", "purpose": "any maskable" },
          { "src": logoUrl, "sizes": "512x512", "type": "image/png", "purpose": "any maskable" }
        ]
      };
      var stringManifest = JSON.stringify(manifestData);
      var blob = new Blob([stringManifest], {type: 'application/json'});
      var manifestURL = URL.createObjectURL(blob);
      var link = document.createElement('link');
      link.rel = 'manifest';
      link.href = manifestURL;
      document.head.appendChild(link);
    })();
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f4f6f9;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
