<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KARSA Absensi Online</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      background: #f8f9fa;
      margin: 0;
      padding: 50px 20px;
      color: #333;
    }
    .loader {
      border: 4px solid #e9ecef;
      border-top: 4px solid #0d6efd;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    a {
      color: #0d6efd;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="loader"></div>
  <h3 style="margin-bottom: 5px;">Membuka KARSA...</h3>
  <p style="font-size: 13px; color: #6c757d;">Menghubungkan ke server absensi...</p>
  
  <p style="font-size: 12px; margin-top: 30px; color: #888;">
    Tidak beralih otomatis? <a id="appLink" href="#">Klik di sini</a>
  </p>

  <script>
    // Paste URL Web App Google Apps Script Anda (akhiran /exec)
    var GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbztNTbARko_1GH_IU_o0g1ia9gxXPaa3dHwEVW6iqrdXXEd3wzDhDJocgj4gIqne6PfKQ/exec";

    document.getElementById("appLink").href = GOOGLE_SCRIPT_URL;

    // Menggunakan location.assign agar aman di browser HP / Safari iOS
    setTimeout(function() {
      window.location.assign(GOOGLE_SCRIPT_URL);
    }, 150);
  </script>

</body>
</html>
